services:
  postgres:
    image: postgres:16-alpine
    container_name: bsm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: botsocietymarkets
      POSTGRES_USER: bsm
      POSTGRES_PASSWORD: bsm-dev-password
    ports:
      - "5432:5432"
    volumes:
      - bsm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsm -d botsocietymarkets"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bsm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BSM_DATABASE_URL: postgresql+psycopg://bsm:bsm-dev-password@postgres:5432/botsocietymarkets
      BSM_SEED_DEMO_DATA: "true"
      BSM_MARKET_PROVIDER: demo
      BSM_SIGNAL_PROVIDER: demo
      BSM_ALERT_INBOX_LIMIT: "10"
      BSM_SESSION_TTL_HOURS: "168"
    ports:
      - "${BSM_HTTP_PORT:-8010}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bsm-worker
    restart: unless-stopped
    profiles: ["worker"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BSM_DATABASE_URL: postgresql+psycopg://bsm:bsm-dev-password@postgres:5432/botsocietymarkets
      BSM_SEED_DEMO_DATA: "true"
      BSM_MARKET_PROVIDER: demo
      BSM_SIGNAL_PROVIDER: demo
      BSM_WORKER_INTERVAL_SECONDS: "300"
      BSM_WORKER_MAX_CYCLES: "0"
    command: ["python", "-m", "api.app.jobs", "worker"]

volumes:
  bsm_postgres_data:
