version: "2.0"

services:
  web:
    image: ghcr.io/ursugit/bot-society-markets:latest
    # credentials:
    #   host: https://ghcr.io
    #   username: your-github-username
    #   password: your-ghcr-read-token
    command:
      - /bin/sh
      - -c
    args:
      - python -m api.app.jobs db-upgrade && python -m uvicorn api.app.main:app --host 0.0.0.0 --port 8000
    env:
      - BSM_ENVIRONMENT_NAME=production
      - BSM_DEPLOYMENT_TARGET=akash
      - BSM_SITE_HOME_PAGE=dashboard
      - BSM_DATABASE_URL=postgresql+psycopg://bsm:CHANGE_ME_DB_PASSWORD@postgres:5432/botsocietymarkets
      - BSM_SEED_DEMO_DATA=true
      - BSM_MARKET_PROVIDER=demo
      - BSM_SIGNAL_PROVIDER=demo
      - BSM_ALERT_INBOX_LIMIT=10
      - BSM_SESSION_TTL_HOURS=168
      - BSM_SIMULATION_LIVE_HISTORY=true
    expose:
      - port: 8000
        as: 80
        accept:
          - app.bitprivat.com
        to:
          - global: true
        http_options:
          max_body_size: 10485760
          read_timeout: 60000
          send_timeout: 60000

  worker:
    image: ghcr.io/ursugit/bot-society-markets:latest
    # credentials:
    #   host: https://ghcr.io
    #   username: your-github-username
    #   password: your-ghcr-read-token
    command:
      - /bin/sh
      - -c
    args:
      - sh ./deploy/akash/run-worker-with-health.sh
    env:
      - BSM_ENVIRONMENT_NAME=production
      - BSM_DEPLOYMENT_TARGET=akash
      - BSM_DATABASE_URL=postgresql+psycopg://bsm:CHANGE_ME_DB_PASSWORD@postgres:5432/botsocietymarkets
      - BSM_SEED_DEMO_DATA=true
      - BSM_MARKET_PROVIDER=demo
      - BSM_SIGNAL_PROVIDER=demo
      - BSM_WORKER_INTERVAL_SECONDS=300
      - BSM_WORKER_MAX_CYCLES=0
      - BSM_NOTIFICATION_RETRY_BASE_SECONDS=300
    expose:
      - port: 9000
        to:
          - service: web

  postgres:
    image: postgres:16-alpine
    env:
      - POSTGRES_DB=botsocietymarkets
      - POSTGRES_USER=bsm
      - POSTGRES_PASSWORD=CHANGE_ME_DB_PASSWORD
    expose:
      - port: 5432
        to:
          - service: web
          - service: worker
    params:
      storage:
        data:
          mount: /var/lib/postgresql/data
          readOnly: false

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 1.0
        memory:
          size: 1Gi
        storage:
          - size: 2Gi
    worker:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 768Mi
        storage:
          - size: 2Gi
    postgres:
      resources:
        cpu:
          units: 1.0
        memory:
          size: 1Gi
        storage:
          - size: 2Gi
          - name: data
            size: 20Gi
            attributes:
              persistent: true
              class: beta3
  placement:
    akash:
      pricing:
        web:
          denom: uact
          amount: 250
        worker:
          denom: uact
          amount: 180
        postgres:
          denom: uact
          amount: 320

deployment:
  web:
    akash:
      profile: web
      count: 1
  worker:
    akash:
      profile: worker
      count: 1
  postgres:
    akash:
      profile: postgres
      count: 1
