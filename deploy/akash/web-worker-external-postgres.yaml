version: "2.0"

services:
  web:
    image: ghcr.io/ursugit/bot-society-markets:latest
    # credentials:
    #   host: https://ghcr.io
    #   username: your-github-username
    #   password: your-ghcr-read-token
    command:
      - /bin/sh
      - -c
    args:
      - python -m api.app.jobs db-upgrade && python -m uvicorn api.app.main:app --host 0.0.0.0 --port 8000
    env:
      - BSM_ENVIRONMENT_NAME=production
      - BSM_DEPLOYMENT_TARGET=akash
      - BSM_SITE_HOME_PAGE=dashboard
      - BSM_CANONICAL_HOST=
      - BSM_CANONICAL_REDIRECT_HOSTS=
      - BSM_FORCE_HTTPS=false
      - BSM_SECURE_SESSION_COOKIE=true
      # Recommended: use a Neon pooled connection string with sslmode=require
      - BSM_DATABASE_URL=postgresql+psycopg://USER:PASSWORD@HOST/DBNAME?sslmode=require
      - BSM_SEED_DEMO_DATA=true
      - BSM_MARKET_PROVIDER=auto
      - BSM_COINGECKO_PLAN=demo
      - BSM_SIGNAL_PROVIDER=demo
      - BSM_SOCIAL_DISCOVERY_PROVIDER=demo
      - BSM_YOUTUBE_API_KEY=
      - BSM_YOUTUBE_DISCOVERY_QUERIES=crypto market analysis,polymarket trading,prediction market analysis,macro trading
      - BSM_YOUTUBE_CHANNEL_IDS=
      - BSM_YOUTUBE_VIDEO_LIMIT=12
      - BSM_VENUE_SIGNAL_PROVIDERS=polymarket,kalshi
      - BSM_ALERT_INBOX_LIMIT=10
      - BSM_SESSION_TTL_HOURS=168
      - BSM_SIMULATION_LIVE_HISTORY=true
    expose:
      - port: 8000
        as: 80
        accept:
          - bitprivat.com
          - www.bitprivat.com
          - app.bitprivat.com
          - api.bitprivat.com
          - status.bitprivat.com
        to:
          - global: true
        http_options:
          max_body_size: 10485760
          read_timeout: 60000
          send_timeout: 60000

  worker:
    image: ghcr.io/ursugit/bot-society-markets:latest
    # credentials:
    #   host: https://ghcr.io
    #   username: your-github-username
    #   password: your-ghcr-read-token
    command:
      - /bin/sh
      - -c
    args:
      - sh ./deploy/akash/run-worker-with-health.sh
    env:
      - BSM_ENVIRONMENT_NAME=production
      - BSM_DEPLOYMENT_TARGET=akash
      # Recommended: use a Neon pooled connection string with sslmode=require
      - BSM_DATABASE_URL=postgresql+psycopg://USER:PASSWORD@HOST/DBNAME?sslmode=require
      - BSM_SEED_DEMO_DATA=true
      - BSM_MARKET_PROVIDER=auto
      - BSM_COINGECKO_PLAN=demo
      - BSM_SIGNAL_PROVIDER=demo
      - BSM_SOCIAL_DISCOVERY_PROVIDER=demo
      - BSM_YOUTUBE_API_KEY=
      - BSM_YOUTUBE_DISCOVERY_QUERIES=crypto market analysis,polymarket trading,prediction market analysis,macro trading
      - BSM_YOUTUBE_CHANNEL_IDS=
      - BSM_YOUTUBE_VIDEO_LIMIT=12
      - BSM_VENUE_SIGNAL_PROVIDERS=polymarket,kalshi
      - BSM_WORKER_INTERVAL_SECONDS=300
      - BSM_WORKER_MAX_CYCLES=0
      - BSM_NOTIFICATION_RETRY_BASE_SECONDS=300
    expose:
      - port: 9000
        to:
          - service: web

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 1.0
        memory:
          size: 1Gi
        storage:
          size: 2Gi
    worker:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 768Mi
        storage:
          size: 2Gi
  placement:
    akash:
      pricing:
        web:
          denom: uact
          amount: 900
        worker:
          denom: uact
          amount: 600

deployment:
  web:
    akash:
      profile: web
      count: 1
  worker:
    akash:
      profile: worker
      count: 1

