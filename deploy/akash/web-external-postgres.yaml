version: "2.0"

services:
  web:
    image: ghcr.io/ursugit/bot-society-markets:latest
    # If the GHCR package is private, uncomment the credentials block and
    # replace the values before deploying.
    # credentials:
    #   host: https://ghcr.io
    #   username: your-github-username
    #   password: your-ghcr-read-token
    command:
      - /bin/sh
      - -c
    args:
      - python -m api.app.jobs db-upgrade && python -m uvicorn api.app.main:app --host 0.0.0.0 --port 8000
    env:
      - BSM_ENVIRONMENT_NAME=production
      - BSM_DEPLOYMENT_TARGET=akash
      - BSM_SITE_HOME_PAGE=dashboard
      - BSM_DATABASE_URL=postgresql+psycopg://USER:PASSWORD@HOST:5432/DBNAME
      - BSM_SEED_DEMO_DATA=true
      - BSM_MARKET_PROVIDER=demo
      - BSM_SIGNAL_PROVIDER=demo
      - BSM_ALERT_INBOX_LIMIT=10
      - BSM_SESSION_TTL_HOURS=168
      - BSM_SIMULATION_LIVE_HISTORY=true
    expose:
      - port: 8000
        as: 80
        accept:
          - app.bitprivat.com
        to:
          - global: true
        http_options:
          max_body_size: 10485760
          read_timeout: 60000
          send_timeout: 60000

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 1.0
        memory:
          size: 1Gi
        storage:
          - size: 2Gi
  placement:
    akash:
      pricing:
        web:
          denom: uact
          amount: 250

deployment:
  web:
    akash:
      profile: web
      count: 1
